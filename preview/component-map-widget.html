<!doctype html><meta charset="utf-8">
<title>Map widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .map {
    height: 220px;
    background:
      linear-gradient(rgba(255,255,255,0.04) 0.5px, transparent 0.5px) 0 0 / 36px 36px,
      linear-gradient(90deg, rgba(255,255,255,0.04) 0.5px, transparent 0.5px) 0 0 / 36px 36px,
      var(--bg-elevated);
    border: 0.5px solid var(--border-default);
    border-radius: var(--radius-lg);
    position: relative;
    padding: 14px;
  }
  .overlay {
    background: var(--bg-panel);
    border: 0.5px solid var(--border-emphasis);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 6px;
    width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.08);
  }
  .line { display: flex; align-items: center; gap: 8px; font: 400 13px/1.3 Inter; color: var(--text-primary); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
<body><div class="card">
  <div class="eyebrow">Map overlay widget</div>
  <div class="map">
    <div class="overlay">
      <div class="line"><span class="dot" style="background:var(--accent-light)"></span>Live airspace</div>
      <div class="line"><span class="dot" style="background:var(--success)"></span>No restrictions active</div>
      <div class="line"><span class="dot" style="background:var(--warning)"></span>Wind 12 kts NW</div>
    </div>
  </div>
</div></body>
