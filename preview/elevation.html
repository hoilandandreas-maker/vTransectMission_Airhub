<!doctype html><meta charset="utf-8">
<title>Elevation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 24px; }
  .card { padding: 0; }
  .stage { background: var(--bg-base); padding: 24px; border-radius: var(--radius-lg); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .demo { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 18px; min-height: 90px; display: flex; flex-direction: column; gap: 6px; }
  .popover { box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.08); }
  .modal { box-shadow: 0 24px 48px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.1); }
  .name { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .meta { font: var(--t-small); color: var(--text-muted); }
</style>
<body><div class="card"><div class="stage">
  <div class="demo popover"><span class="name">shadow/popover</span><span class="meta">dropdowns, tooltips</span></div>
  <div class="demo modal"><span class="name">shadow/modal</span><span class="meta">dialogs, sheets</span></div>
</div></div></body>
