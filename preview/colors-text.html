<!doctype html><meta charset="utf-8">
<title>Text</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .item { background: var(--bg-elevated); border: var(--border-width) solid var(--border-default); border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .sample { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .meta { font: var(--t-small); color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
<body><div class="card">
  <div class="eyebrow">Text colors</div>
  <div class="grid">
    <div class="item"><span class="sample" style="color:#e8f4f8">Mission Aa</span><span class="meta">text/primary · #e8f4f8</span></div>
    <div class="item"><span class="sample" style="color:#a8c8d8">Altitude 100 m</span><span class="meta">text/secondary · #a8c8d8</span></div>
    <div class="item"><span class="sample" style="color:#5a8a9f">e.g. Flare Aker</span><span class="meta">text/muted · #5a8a9f</span></div>
  </div>
</div></body>
