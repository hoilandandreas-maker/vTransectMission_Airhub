<!doctype html><meta charset="utf-8">
<title>Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  button {
    height: var(--btn-height);
    padding: 0 var(--btn-pad-x);
    border-radius: var(--radius-md);
    font: 500 13px/1 Inter;
    border: 0.5px solid var(--border-default);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out), transform 90ms var(--ease-out);
  }
  button:active { transform: scale(0.96); }
  .primary { background: var(--accent-primary); color: white; border-color: transparent; }
  .primary:hover { background: #2089c9; }
  .secondary { background: var(--bg-elevated); color: var(--text-primary); }
  .secondary:hover { background: var(--bg-hover); }
  .danger { background: rgba(248,113,113,0.12); color: var(--danger); border-color: rgba(248,113,113,0.35); }
  .danger:hover { background: rgba(248,113,113,0.2); }
  .ghost { background: transparent; color: var(--text-secondary); border-color: transparent; }
  .ghost:hover { color: var(--text-primary); }
  .meta { font: var(--t-small); color: var(--text-muted); }
</style>
<body><div class="card">
  <div class="eyebrow">Buttons · 34px height · 6px radius</div>
  <div class="row">
    <button class="primary">New flight</button>
    <button class="secondary">Export</button>
    <button class="danger">Delete</button>
    <button class="ghost">Cancel</button>
  </div>
  <div class="meta">Padding 14px H / 8px V · Font 13px / 500 · Hover shifts bg up one tonal step</div>
</div></body>
