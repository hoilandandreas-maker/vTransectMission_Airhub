<!doctype html><meta charset="utf-8">
<title>Label specimen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .demo { background: var(--bg-elevated); border: var(--border-width) solid var(--border-default); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .lbl { font: 500 11px/1.4 Inter; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
  .val { font: 500 16px/1.4 Inter; color: var(--text-primary); }
  .examples { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .examples > div { background: var(--bg-panel); padding: 12px; border-radius: var(--radius-md); }
</style>
<body><div class="card">
  <div class="eyebrow">Label · 11px / Medium / +6% LS / UPPERCASE</div>
  <div class="examples">
    <div><div class="lbl">Flight status</div><div class="val">Active</div></div>
    <div><div class="lbl">Mission name</div><div class="val">Flare inspection</div></div>
    <div><div class="lbl">Pilot</div><div class="val">Andreas</div></div>
  </div>
</div></body>
