<!doctype html><meta charset="utf-8">
<title>Radii</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch; }
  .item { background: var(--bg-elevated); border: var(--border-width) solid var(--border-emphasis); padding: 18px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .meta { font: var(--t-small); color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
<body><div class="card">
  <div class="eyebrow">Corner radii</div>
  <div class="row">
    <div class="item" style="border-radius:4px"><span class="name">radius/sm · 4px</span><span class="meta">badges, chips</span></div>
    <div class="item" style="border-radius:6px"><span class="name">radius/md · 6px</span><span class="meta">buttons, inputs</span></div>
    <div class="item" style="border-radius:8px"><span class="name">radius/lg · 8px</span><span class="meta">cards, panels</span></div>
  </div>
</div></body>
