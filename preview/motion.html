<!doctype html><meta charset="utf-8">
<title>Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .demo { background: var(--bg-elevated); border: var(--border-width) solid var(--border-default); border-radius: var(--radius-lg); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .name { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .val { font: 500 16px/1.4 Inter; color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .meta { font: var(--t-small); color: var(--text-muted); }
</style>
<body><div class="card">
  <div class="eyebrow">Motion · snappy, no bounce</div>
  <div class="grid">
    <div class="demo"><span class="name">dur/fast</span><span class="val">120 ms</span><span class="meta">hover, color shift</span></div>
    <div class="demo"><span class="name">dur/base</span><span class="val">180 ms</span><span class="meta">panels, popovers</span></div>
    <div class="demo"><span class="name">ease/out</span><span class="val" style="font-size:13px">cubic-bezier(.16,.84,.44,1)</span><span class="meta">all transitions</span></div>
  </div>
</div></body>
