<!doctype html><meta charset="utf-8">
<title>Spacing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 18px; padding-top: 8px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; font: var(--t-small); color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .step .bar { background: var(--accent-primary); width: 14px; border-radius: 2px; }
  .step .label { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
</style>
<body><div class="card">
  <div class="eyebrow">Spacing scale</div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><span class="label">xs</span><span>4</span></div>
    <div class="step"><div class="bar" style="height:8px"></div><span class="label">sm</span><span>8</span></div>
    <div class="step"><div class="bar" style="height:14px"></div><span class="label">md</span><span>12–14</span></div>
    <div class="step"><div class="bar" style="height:24px"></div><span class="label">lg</span><span>24</span></div>
    <div class="step"><div class="bar" style="height:48px"></div><span class="label">xl</span><span>48</span></div>
    <div class="step"><div class="bar" style="height:64px"></div><span class="label">2xl</span><span>64</span></div>
  </div>
</div></body>
