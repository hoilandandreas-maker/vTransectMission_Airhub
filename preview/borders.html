<!doctype html><meta charset="utf-8">
<title>Borders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .demo { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 18px; min-height: 100px; display: flex; flex-direction: column; gap: 8px; }
  .demo.default { border: 0.5px solid rgba(255,255,255,0.08); }
  .demo.emphasis { border: 0.5px solid rgba(255,255,255,0.15); }
  .name { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); }
  .meta { font: var(--t-small); color: var(--text-muted); }
</style>
<body><div class="card">
  <div class="eyebrow">Borders · hairline 0.5px</div>
  <div class="row">
    <div class="demo default"><span class="name">border/default</span><span class="meta">rgba(255,255,255,0.08) — cards, fields, dividers</span></div>
    <div class="demo emphasis"><span class="name">border/emphasis</span><span class="meta">rgba(255,255,255,0.15) — focused / selected</span></div>
  </div>
</div></body>
