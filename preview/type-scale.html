<!doctype html><meta charset="utf-8">
<title>Type scale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 0; vertical-align: baseline; border-bottom: var(--border-width) solid var(--border-default); }
  td:last-child { text-align: left; padding-left: 24px; }
  td.meta { font: var(--t-label); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; width: 200px; }
  tr:last-child td { border-bottom: none; }
</style>
<body><div class="card">
  <div class="eyebrow">Typography — Inter</div>
  <table>
    <tr><td class="meta">28 / SemiBold · H1</td><td style="font:600 28px/1.2 Inter; letter-spacing:-0.01em;">Mission Planning</td></tr>
    <tr><td class="meta">20 / Medium · H2</td><td style="font:500 20px/1.3 Inter;">Flight Operations</td></tr>
    <tr><td class="meta">16 / Medium · H3</td><td style="font:500 16px/1.4 Inter;">Live Airspace View</td></tr>
    <tr><td class="meta">14 / Regular · Body</td><td style="font:400 14px/1.5 Inter;">Altitude 100 m · VLOS · Stavanger</td></tr>
    <tr><td class="meta">12 / Regular · Small</td><td style="font:400 12px/1.45 Inter; color:var(--text-secondary);">Start mission 11-06-2025 09:00</td></tr>
  </table>
</div></body>
